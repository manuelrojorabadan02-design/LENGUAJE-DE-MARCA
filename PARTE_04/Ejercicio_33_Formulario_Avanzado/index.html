<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Avanzado - Ejercicio 33</title>
    <link rel="stylesheet" href="dist/css/style.css">
</head>

<body>
    <div class="form-container">
        <h2>Registro de Usuario</h2>
        <form id="registro-form" novalidate>
            <div class="input-group">
                <label for="nombre">Nombre de usuario</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ej. juanperez">
                <span class="mensaje-error" id="error-nombre"></span>
            </div>

            <div class="input-group">
                <label for="correo">Correo Electrónico</label>
                <input type="text" id="correo" name="correo" placeholder="ejemplo@correo.com">
                <span class="mensaje-error" id="error-correo"></span>
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres">
                <span class="mensaje-error" id="error-password"></span>
            </div>

            <div class="input-group">
                <label for="password_rep">Repetir Contraseña</label>
                <input type="password" id="password_rep" name="password_rep" placeholder="Debe coincidir">
                <span class="mensaje-error" id="error-password_rep"></span>
            </div>

            <div class="input-group">
                <label for="telefono">Teléfono</label>
                <input type="tel" id="telefono" name="telefono" placeholder="9 dígitos">
                <span class="mensaje-error" id="error-telefono"></span>
            </div>

            <button type="submit" class="btn-submit">Registrarse</button>
        </form>
    </div>
    <script src="src/js/main.js"></script>
</body>

</html>
