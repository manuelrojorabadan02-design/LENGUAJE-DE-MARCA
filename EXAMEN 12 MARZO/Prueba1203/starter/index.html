<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen Parte 3: Tarjeta de Producto</title>
    <!-- El CSS se generará en dist/css/style.css mediante Gulp -->
    <link rel="stylesheet" href="dist/css/style.css">
</head>
<body>

    <main class="container">
        <div class="card">
            <img src="https://via.placeholder.com/300x200" alt="Producto" class="card__img">
            <div class="card__content">
                <h2 class="card__title">Zapatilla Deportiva X</h2>
                <p class="card__description">Diseñadas para el máximo rendimiento y comodidad en todo terreno.</p>
                <p class="card__price">89,99€</p>
                <button id="btn-comprar" class="btn">Comprar</button>
            </div>
        </div>
    </main>

    <script src="src/js/script.js"></script>
</body>
</html>
